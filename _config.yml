title: Yaseer Arafat
description: Portfolio and engineering notes by Yaseer Arafat.
theme: jekyll-theme-primer

# GitHub Pages URL configuration
url: "https://github.yaseerarafat.com"
baseurl: ""

# Pretty links for posts, used by navigation and homepage links
permalink: /:title/

author:
  name: Yaseer Arafat
  email: yaseer.arafat@live.com

social:
  github: emonarafat
  linkedin: yaseerarafat

markdown: kramdown

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
      author: Yaseer Arafat

exclude:
  - node_modules
  - README.md
  - Gemfile
  - Gemfile.lock

nav:
  - Home: /
  - About: /about/
  - Projects: /projects/
  - Blog: /blog/
  - Contact: /contact/
  - CQRS with MediatR: /CQRS-MeditR-Demo/
  - CancellationToken in C#: /Mastering_CancellationToken/
